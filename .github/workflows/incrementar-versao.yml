name: Incrementar versĂŁo

on:
  push:
    branches:
      - main

jobs:
  bump-version:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Ler versĂŁo atual
        id: versao
        run: |
          VERSAO=$(grep -oP '\d+\.\d+\.\d+' versao.tex)
          echo "versao=$VERSAO" >> $GITHUB_OUTPUT

      - name: Incrementar PATCH
        run: |
          V=${{ steps.versao.outputs.versao }}
          MAJOR=$(echo $V | cut -d. -f1)
          MINOR=$(echo $V | cut -d. -f2)
          PATCH=$(echo $V | cut -d. -f3)
          PATCH=$((PATCH + 1))
          NOVA="$MAJOR.$MINOR.$PATCH"
          echo "\newcommand{\versao}{$NOVA}" > versao.tex
          echo "NOVA=$NOVA" >> $GITHUB_ENV

      - name: Commit e push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add versao.tex
          git commit -m "Incrementando versĂŁo para $NOVA"
          git push
