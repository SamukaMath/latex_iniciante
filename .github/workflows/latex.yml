name: Compilar e publicar PDF do LaTeX

on:
  push:          # roda automaticamente quando você envia ou altera arquivos
    branches: [ "INTRODUÇÃO_AO_LATEX" ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write   # permite que o GitHub Actions envie o PDF para o repositório

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Baixar o código
        uses: actions/checkout@v4

      - name: 🧰 Instalar LaTeX completo
        run: sudo apt-get update && sudo apt-get install -y texlive-full

      - name: 🏗️ Compilar o documento
        run: |
          pdflatex -interaction=nonstopmode -shell-escape INTRODUÇÃO_AO_LATEX.tex
          pdflatex -interaction=nonstopmode -shell-escape INTRODUÇÃO_AO_LATEX.tex

      - name: 🧩 Renomear o PDF final
        run: mv INTRODUÇÃO_AO_LATEX.pdf latex_iniciante.pdf

      - name: 📤 Fazer commit automático do PDF
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add latex_iniciante.pdf
          git commit -m "🧾 PDF 'latex_iniciante.pdf' atualizado automaticamente"
          git push
